services:
  opds-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: opds-server
    restart: unless-stopped
    ports:
      - "9988:9988"
    volumes:
      # Database and configuration storage
      - ./data:/data
      # Books library folder (contains INPX and ZIP files)
      - ./books:/books
    environment:
      - OPDS_DATABASE_PATH=/data/opds.db
      - OPDS_SERVER_HOST=0.0.0.0
      - OPDS_SERVER_PORT=9988
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9988/api/setup/check"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
